kind = "web"
previewPath = "/"
title = "เลี่ยมกรอบพระเลเซอร์ รวยล้านล้าน"
version = "1.0.0"
id = "artifacts/laser-frame-shop"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21415

[services.development]
run = "pnpm --filter @workspace/laser-frame-shop run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/laser-frame-shop", "run", "build" ]
publicDir = "artifacts/laser-frame-shop/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21415"
BASE_PATH = "/"
